spring.application.name=ai-legal-document-assistant

# ---- File upload limits ----
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ---- H2 embedded database (file-based, persists between runs) ----
spring.datasource.url=jdbc:h2:file:./data/legalai;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- LLM configuration ----
# Leave llm.api-key empty to run fully offline with the rule-based analyzer.
# Set it (or export LLM_API_KEY) to enable real AI-powered summaries, risk
# review, and Q&A via any OpenAI-compatible /chat/completions endpoint.
llm.api-key=${LLM_API_KEY:}
llm.api-url=${LLM_API_URL:https://api.openai.com/v1/chat/completions}
llm.model=${LLM_MODEL:gpt-4o-mini}

server.port=8081
